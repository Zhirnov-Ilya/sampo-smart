services:
  db:
    image: postgres:16-alpine
    container_name: sampo-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sampo_db
      POSTGRES_USER: sampo_user
      POSTGRES_PASSWORD: sampo_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  backend:
    build:
      context: ./backend
    container_name: sampo-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: sampo_db
      DB_USER: sampo_user
      DB_PASSWORD: sampo_password
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: sampo-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data: